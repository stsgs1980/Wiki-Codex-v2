# =============================================================================
# Wiki Codex - CI Pipeline
# Z.ai Reproducibility Standard v1.0 L3
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wiki_codex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.16"

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Generate Prisma Client
        run: bunx prisma generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/wiki_codex_test"

      - name: Push DB schema
        run: bunx prisma db push --skip-generate --accept-data-loss
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/wiki_codex_test"

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/wiki_codex_test"
          OPENAI_API_KEY: "test-key-for-build"

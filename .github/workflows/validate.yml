name: Validate Structure

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          missing=0
          for f in AGENT_RULES.md PROJECT_CONFIG.md README.md .env.example; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              missing=1
            else
              echo "OK: $f"
            fi
          done
          for d in instructions standards skills; do
            if [ ! -d "$d" ]; then
              echo "MISSING DIR: $d"
              missing=1
            else
              echo "OK DIR: $d"
            fi
          done
          exit $missing

      - name: Check no emoji in skills/instructions
        run: |
          errors=0
          for f in skills/*/SKILL.md instructions/*.md; do
            if [ -f "$f" ]; then
              if grep -Pq '[\x{1F000}-\x{1FFFF}\x{2600}-\x{27BF}\x{FE00}-\x{FEFF}\x{1F900}-\x{1F9FF}\x{2702}-\x{27B0}]' "$f" 2>/dev/null; then
                echo "EMOJI FOUND: $f"
                errors=1
              fi
            fi
          done
          exit $errors

      - name: Check stack signature in core files
        run: |
          sig="Built with:"
          found=0
          for f in README.md AGENT_RULES.md; do
            if [ -f "$f" ] && grep -q "$sig" "$f"; then
              echo "Stack signature found in $f"
              found=1
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "WARNING: Stack signature not found in core files"
          fi

      - name: Check no trailing whitespace
        run: |
          errors=0
          for f in skills/*/SKILL.md instructions/*.md standards/*.md; do
            if [ -f "$f" ]; then
              if grep -Pq '\s+$' "$f"; then
                echo "TRAILING WHITESPACE: $f"
                errors=1
              fi
            fi
          done
          exit $errors
